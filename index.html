<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>담온 | 식자재 유통</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div id="header-container"></div>
  <main id="app"></main>
  <div id="footer-container"></div>

  <script src="components.js"></script>
  <script src="router.js"></script>

<div class="floating-buttons">
  <a href="#" class="float-btn call-btn" id="phoneFloatingBtn" aria-label="전화 연결"></a>
  <a href="https://open.kakao.com/o/damon" class="float-btn kakao-btn" target="_blank" rel="noopener noreferrer"><svg width="22" height="22" viewBox="0 0 24 24"><path fill="black" d="M12 3C6.48 3 2 6.58 2 11c0 2.61 1.58 4.93 4 6.37V21l3.5-2.1c.8.1 1.62.15 2.5.15 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg></a>
</div>


<div class="phone-popup-overlay" id="phonePopupOverlay" hidden>
  <div class="phone-popup" role="dialog" aria-modal="true" aria-labelledby="phonePopupTitle">
    <button class="phone-popup-close" id="phonePopupClose" aria-label="팝업 닫기">×</button>
    <div class="phone-popup-label">전화 문의</div>
    <h3 id="phonePopupTitle">031-1234-1234</h3>
    
    <div class="phone-popup-actions">
      <a href="tel:031-1234-1234" class="phone-popup-call">전화 걸기</a>
      <button type="button" class="phone-popup-copy" id="phonePopupCopy">번호 복사</button>
    </div>
  </div>
</div>


<script>
(function () {
  const phoneNumber = "031-1234-1234";
  const btn = document.getElementById("phoneFloatingBtn");
  const overlay = document.getElementById("phonePopupOverlay");
  const closeBtn = document.getElementById("phonePopupClose");
  const copyBtn = document.getElementById("phonePopupCopy");

  if (!btn) return;

  function isMobileDevice() {
    return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "")
      || (window.matchMedia && window.matchMedia("(max-width: 768px)").matches);
  }

  function openPopup() {
    if (!overlay) return;
    overlay.hidden = false;
    document.body.classList.add("popup-open");
  }

  function closePopup() {
    if (!overlay) return;
    overlay.hidden = true;
    document.body.classList.remove("popup-open");
  }

  btn.innerHTML = `
    <svg width="26" height="26" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.49c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.19 2.2z" fill="white"/>
      <circle cx="17.5" cy="6.5" r="2.2" fill="#77b032"/>
    </svg>
  `;

  btn.addEventListener("click", function (e) {
    e.preventDefault();
    if (isMobileDevice()) {
      window.location.href = "tel:" + phoneNumber.replace(/-/g, "");
    } else {
      openPopup();
    }
  });

  if (closeBtn) closeBtn.addEventListener("click", closePopup);

  if (overlay) {
    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) closePopup();
    });
  }

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closePopup();
  });

  if (copyBtn) {
    copyBtn.addEventListener("click", async function () {
      try {
        await navigator.clipboard.writeText(phoneNumber);
        copyBtn.textContent = "복사 완료";
        setTimeout(() => copyBtn.textContent = "번호 복사", 1500);
      } catch (err) {
        copyBtn.textContent = "복사 실패";
        setTimeout(() => copyBtn.textContent = "번호 복사", 1500);
      }
    });
  }
})();
</script>

</body>
</html>
