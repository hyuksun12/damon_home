<!-- ===== PRODUCTS PAGE ===== -->

<!-- 페이지 히어로 -->
<section class="page-hero">
  <div class="page-hero-inner">
    <p class="page-hero-label">OUR PRODUCTS</p>
    <h1 class="page-hero-title">상품목록</h1>
  </div>
</section>


<!-- ===== 상품 목록 ===== -->
<section class="products-page">
  <div class="products-page-inner">

    <!-- 카테고리 필터 탭 -->
    <div class="product-filter">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="냉장">냉장</button>
      <button class="filter-btn" data-filter="냉동">냉동</button>
      <button class="filter-btn" data-filter="가공">가공(실온)</button>
    </div>

    <!-- 상품 그리드 (JS에서 동적 로드) -->
    <ul class="products-full-grid" id="productsGrid"></ul>

    <!-- 빈 결과 (필터 결과 없을 때) -->
    <div class="products-empty" id="productsEmpty" style="display:none;">
      <p>해당 카테고리의 상품이 없습니다.</p>
    </div>

  </div>

  <!-- 하단 문의 배너 -->
  <div class="products-inquiry-banner">
    <div class="products-inquiry-inner">
      <div class="inquiry-banner-text">
        <p class="inquiry-banner-title">찾으시는 품목이 없으신가요?</p>
        <p class="inquiry-banner-desc">목록에 없는 품목도 상담을 통해 공급 가능 여부를 확인해 드립니다.</p>
      </div>
      <a href="#" class="btn-inquiry-banner" data-page="contact">
        품목 문의하기
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8H13M9 4L13 8L9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>
  </div>

</section>
